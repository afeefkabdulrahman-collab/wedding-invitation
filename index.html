<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <title>Afeef & Nada Wedding</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .font-serif-elegant { font-family: 'Cinzel', serif; }

        /* Golden Pop Animation */
        @keyframes gold-pop {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { opacity: 0.8; }
            100% { transform: scale(1.5) rotate(45deg); opacity: 0; }
        }
        .gold-particle {
            position: fixed; pointer-events: none;
            width: 15px; height: 15px;
            background: linear-gradient(135deg, #ffd700, #daa520);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: gold-pop 0.7s ease-out forwards;
            z-index: 100;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-emerald-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useState } = React;

        function WeddingApp() {
            const [view, setView] = useState('invite'); // 'invite' or 'rsvp'
            const [pops, setPops] = useState([]);
            const weddingDate = new Date("2026-06-21T00:00:00");
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, mins: 0, secs: 0 });

            // Handle Golden Pops
            const handleInteraction = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX || (e.touches && e.touches[0].clientX);
                const y = e.clientY || (e.touches && e.touches[0].clientY);
                
                const newPop = { id: Date.now(), x, y };
                setPops(prev => [...prev, newPop]);
                setTimeout(() => setPops(prev => prev.filter(p => p.id !== newPop.id)), 700);
            };

            // Countdown Logic
            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date();
                    const diff = weddingDate - now;
                    if (diff > 0) {
                        setTimeLeft({
                            days: Math.floor(diff / (1000 * 60 * 60 * 24)),
                            hours: Math.floor((diff / (1000 * 60 * 60)) % 24),
                            mins: Math.floor((diff / (1000 * 60)) % 60),
                            secs: Math.floor((diff / 1000) % 60)
                        });
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-emerald-100 via-white to-teal-100">
                    
                    {/* Render Pops */}
                    {pops.map(p => (
                        <div key={p.id} className="gold-particle" style={{ left: p.x - 7, top: p.y - 7 }} />
                    ))}

                    <div className="relative z-10 w-full max-w-lg glass-card rounded-[2.5rem] shadow-2xl p-8 text-center border-t-4 border-amber-400">
                        
                        {/* Tab Switcher */}
                        <div className="inline-flex bg-emerald-100/50 p-1 rounded-full mb-8" onClick={handleInteraction}>
                            <button 
                                onClick={() => setView('invite')}
                                className={`px-8 py-2 rounded-full text-sm font-semibold transition-all ${view === 'invite' ? 'bg-emerald-600 text-white shadow-lg' : 'text-emerald-700'}`}>
                                Invitation
                            </button>
                            <button 
                                onClick={() => setView('rsvp')}
                                className={`px-8 py-2 rounded-full text-sm font-semibold transition-all ${view === 'rsvp' ? 'bg-emerald-600 text-white shadow-lg' : 'text-emerald-700'}`}>
                                RSVP
                            </button>
                        </div>

                        {view === 'invite' ? (
                            <div className="space-y-6">
                                <div className="text-emerald-600 tracking-[0.4em] text-xs font-bold uppercase mb-4">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْم</div>
                                
                                <h1 className="font-serif-elegant text-4xl text-emerald-900 tracking-tight">Afeef & Nada</h1>
                                <p className="text-emerald-600 italic font-light tracking-widest text-sm">Together with their families</p>
                                
                                <div className="grid grid-cols-4 gap-2 my-8">
                                    {Object.entries(timeLeft).map(([label, val]) => (
                                        <div key={label} className="bg-white/50 border border-emerald-100 rounded-2xl py-3">
                                            <div className="text-2xl font-bold text-emerald-800">{val}</div>
                                            <div className="text-[10px] uppercase text-emerald-500 font-bold">{label}</div>
                                        </div>
                                    ))}
                                </div>

                                <div className="space-y-2 text-emerald-800 font-medium">
                                    <p className="flex items-center justify-center gap-2">📍 J & R Convention Center</p>
                                    <p className="flex items-center justify-center gap-2">📅 June 21, 2026</p>
                                </div>

                                <button 
                                    onClick={(e) => { handleInteraction(e); setView('rsvp'); }}
                                    className="w-full py-4 bg-gradient-to-r from-emerald-600 to-teal-600 text-white rounded-2xl font-bold shadow-xl hover:scale-[1.02] transition-transform">
                                    Confirm Your Attendance
                                </button>
                            </div>
                        ) : (
                            <div className="space-y-6 py-4">
                                <h2 className="font-serif-elegant text-3xl text-emerald-900">Will you join us?</h2>
                                <p className="text-emerald-600 text-sm">We would be honored to have you with us on our special day.</p>
                                
                                <div className="p-8 border-2 border-dashed border-emerald-200 rounded-3xl bg-emerald-50/50">
                                    <p className="text-emerald-800 font-medium mb-4 italic">"Include us in your prayers"</p>
                                    <p className="text-xs text-emerald-500 uppercase font-bold tracking-widest">RSVP Form coming soon...</p>
                                </div>

                                <button 
                                    onClick={() => setView('invite')}
                                    className="text-emerald-600 text-sm font-semibold underline">
                                    Back to Invitation
                                </button>
                            </div>
                        )}
                        
                        <p className="mt-8 text-[10px] text-emerald-400 font-bold tracking-[0.2em] uppercase">With Love, Family & Friends</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WeddingApp />);
    </script>
</body>
</html>
