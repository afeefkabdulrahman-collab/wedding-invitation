<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>Afeef & Nada Reception</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Amiri&display=swap');
        
        body { 
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .font-serif-elegant { font-family: 'Cinzel', serif; }
        .font-cursive { font-family: 'Great Vibes', cursive; }
        .font-arabic { font-family: 'Amiri', serif; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        .gold-text {
            background: linear-gradient(to bottom, #c5a059, #8e6d2f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .petal {
            position: absolute; pointer-events: none;
            background: #fff; border-radius: 0 50% 0 50%;
            opacity: 0.3; animation: fall 15s infinite linear;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useState } = React;

        function WeddingApp() {
            const [view, setView] = useState('invite');
            const [status, setStatus] = useState('attending');
            const [guestCount, setGuestCount] = useState(1);
            const [name, setName] = useState('');
            
            // June 21, 2026 @ 6:00 PM
            const weddingDate = new Date("2026-06-21T18:00:00");
            const [timeLeft, setTimeLeft] = useState({ days: 0, hrs: 0, mins: 0, secs: 0 });

            // Links - UPDATED
            const mapUrl = "https://maps.google.com/?q=J+%26+R+Convention+Center"; 
            const whatsappUrl = "https://wa.me/971565567150";
            
            // Google Calendar Link: June 21, 2026, 6pm to 9pm (18:00 to 21:00)
            const calendarUrl = "https://www.google.com/calendar/render?action=TEMPLATE&text=Reception+Ceremony:+Afeef+%26+Nada&dates=20260621T180000/20260621T210000&details=We+invite+you+to+celebrate+the+wedding+reception+of+Afeef+and+Nada.&location=J+%26+R+Convention+Center";

            const handleRSVPSubmit = (e) => {
                e.preventDefault();
                if (status === 'attending') {
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#c5a059', '#e8d2a6'] });
                    alert(`We look forward to seeing you, ${name}!`);
                } else {
                    alert(`Thank you, ${name}. We appreciate your prayers! 🤲`);
                }
                setView('invite');
            };

            useEffect(() => {
                const timer = setInterval(() => {
                    const diff = weddingDate - new Date();
                    if (diff > 0) {
                        setTimeLeft({
                            days: Math.floor(diff / (1000 * 60 * 60 * 24)),
                            hrs: Math.floor((diff / (1000 * 60 * 60)) % 24),
                            mins: Math.floor((diff / (1000 * 60)) % 60),
                            secs: Math.floor((diff / 1000) % 60)
                        });
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="min-h-screen flex items-center justify-center p-6 relative">
                    {[...Array(12)].map((_, i) => (
                        <div key={i} className="petal" style={{
                            width: Math.random() * 15 + 10 + 'px',
                            height: Math.random() * 15 + 10 + 'px',
                            left: Math.random() * 100 + '%',
                            animationDelay: Math.random() * 15 + 's',
                            background: i % 2 === 0 ? '#ffe4e6' : '#fff'
                        }} />
                    ))}

                    <div className="w-full max-w-lg glass-panel rounded-[3rem] p-10 text-center relative z-10">
                        <div className="flex justify-center gap-8 mb-10 text-[10px] tracking-[0.2em] font-bold uppercase text-gray-400">
                            <button onClick={() => setView('invite')} className={view === 'invite' ? 'text-gray-900 border-b border-gold-500 pb-1' : ''}>The Invite</button>
                            <button onClick={() => setView('rsvp')} className={view === 'rsvp' ? 'text-gray-900 border-b border-gold-500 pb-1' : ''}>RSVP</button>
                        </div>

                        {view === 'invite' ? (
                            <div className="animate-in fade-in duration-1000">
                                <div className="font-arabic text-4xl gold-text mb-6">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْم</div>
                                
                                <h1 className="font-serif-elegant text-4xl text-gray-800 mb-2">Afeef & Nada</h1>
                                <p className="font-cursive text-3xl text-gray-500 mb-8">Reception Ceremony</p>
                                
                                <div className="flex justify-center gap-6 mb-10 text-gray-600">
                                    {Object.entries(timeLeft).map(([label, val]) => (
                                        <div key={label}>
                                            <div className="text-xl font-light">{val}</div>
                                            <div className="text-[8px] uppercase tracking-widest opacity-60">{label}</div>
                                        </div>
                                    ))}
                                </div>

                                <div className="space-y-1 mb-10 text-gray-700 text-sm tracking-wide">
                                    <p className="font-semibold text-gray-900">JUNE 21, 2026</p>
                                    <p>6:00 PM — 9:00 PM</p>
                                    <p className="opacity-80">J & R CONVENTION CENTER</p>
                                </div>

                                <div className="flex justify-center gap-10 mb-10">
                                    <a href={mapUrl} target="_blank" className="group flex flex-col items-center gap-2">
                                        <div className="w-12 h-12 flex items-center justify-center rounded-full bg-white/60 group-hover:bg-white transition-all shadow-sm">📍</div>
                                        <span className="text-[9px] uppercase tracking-widest text-gray-400">Location</span>
                                    </a>
                                    <a href={calendarUrl} target="_blank" className="group flex flex-col items-center gap-2">
                                        <div className="w-12 h-12 flex items-center justify-center rounded-full bg-white/60 group-hover:bg-white transition-all shadow-sm">📅</div>
                                        <span className="text-[9px] uppercase tracking-widest text-gray-400">Calendar</span>
                                    </a>
                                    <a href={whatsappUrl} target="_blank" className="group flex flex-col items-center gap-2">
                                        <div className="w-12 h-12 flex items-center justify-center rounded-full bg-white/60 group-hover:bg-white transition-all shadow-sm">💬</div>
                                        <span className="text-[9px] uppercase tracking-widest text-gray-400">WhatsApp</span>
                                    </a>
                                </div>

                                <button onClick={() => setView('rsvp')} className="w-full py-4 rounded-full border border-gray-200 text-gray-800 text-xs font-bold uppercase tracking-widest hover:bg-white/50 transition shadow-sm">
                                    Confirm Your Attendance
                                </button>
                            </div>
                        ) : (
                            <form onSubmit={handleRSVPSubmit} className="animate-in slide-in-from-bottom duration-500">
                                <h2 className="font-serif-elegant text-2xl text-gray-800 mb-8">RSVP</h2>
                                <input required type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Your Name" className="w-full bg-transparent border-b border-gray-200 py-3 mb-8 outline-none text-center text-gray-800 focus:border-gold-500 transition-colors" />

                                <div className="flex justify-center gap-10 mb-10">
                                    <button type="button" onClick={() => setStatus('attending')} className={`text-[10px] uppercase tracking-widest font-bold ${status === 'attending' ? 'text-gray-900 border-b border-gray-900' : 'text-gray-400'}`}>Attending</button>
                                    <button type="button" onClick={() => setStatus('not_attending')} className={`text-[10px] uppercase tracking-widest font-bold ${status === 'not_attending' ? 'text-gray-900 border-b border-gray-900' : 'text-gray-400'}`}>Not attending</button>
                                </div>

                                {status === 'attending' ? (
                                    <div className="flex items-center justify-center gap-8 mb-10">
                                        <button type="button" onClick={() => setGuestCount(Math.max(1, guestCount-1))} className="text-2xl text-gray-300">-</button>
                                        <div className="text-center">
                                            <span className="text-2xl text-gray-800">{guestCount}</span>
                                            <p className="text-[8px] uppercase text-gray-400">Attendees</p>
                                        </div>
                                        <button type="button" onClick={() => setGuestCount(guestCount+1)} className="text-2xl text-gray-300">+</button>
                                    </div>
                                ) : (
                                    <p className="italic text-gray-400 mb-10">"Please include us in your prayers" 🤲</p>
                                )}

                                <button type="submit" className="w-full py-4 bg-gray-900 text-white rounded-full text-xs font-bold uppercase tracking-widest shadow-xl">Submit Response</button>
                            </form>
                        )}
                        <p className="mt-10 text-[8px] text-gray-300 font-bold tracking-[0.4em] uppercase">With Love, Family & Friends</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WeddingApp />);
    </script>
</body>
</html>
