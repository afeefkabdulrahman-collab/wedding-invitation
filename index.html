<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>Afeef & Nada Reception</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Amiri:wght@400;700&family=Montserrat:wght@300;400;600&display=swap');
        
        body { font-family: 'Montserrat', sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }

        .font-serif-elegant { font-family: 'Cinzel', serif; }
        .font-cursive { font-family: 'Great Vibes', cursive; }
        .font-arabic { font-family: 'Amiri', serif; }

        .page-background {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #0d2e25 0%, #1a6350 50%, #d1e9ff 100%);
            z-index: -2;
        }

        .card-float {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 3rem;
            width: 100%; max-width: 480px; padding: 3rem 2rem;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5);
        }

        .gold-text {
            background: linear-gradient(to bottom, #d4af37, #fcf6ba, #aa771c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Oval Icons Styling */
        .icon-oval {
            width: 85px; height: 55px; border-radius: 40px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .icon-oval:hover { background: rgba(212, 175, 55, 0.15); border-color: #fcf6ba; transform: translateY(-3px); }

        .gold-btn {
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 50%, #aa771c 100%);
            color: #1a1a1a; font-weight: 700; letter-spacing: 0.1em;
        }

        .petal { position: absolute; pointer-events: none; background: #fff; border-radius: 0 50% 0 50%; opacity: 0.3; animation: fall 15s infinite linear; }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useState } = React;

        function WeddingApp() {
            const [view, setView] = useState('invite');
            const [status, setStatus] = useState('attending');
            const [guestCount, setGuestCount] = useState(1);
            const [name, setName] = useState('');
            const weddingDate = new Date("2026-06-21T18:00:00");
            const [timeLeft, setTimeLeft] = useState({ DAYS: 0, HRS: 0, MINS: 0, SECS: 0 });

            const mapUrl = "https://maps.google.com/?q=J+%26+R+Convention+Center"; 
            const whatsappUrl = "https://wa.me/971565567150";
            const calendarUrl = "https://www.google.com/calendar/render?action=TEMPLATE&text=Reception:+Afeef+%26+Nada&dates=20260621T180000/20260621T210000&location=J+%26+R+Convention+Center";

            const handleRSVPSubmit = (e) => {
                e.preventDefault();
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#bf953f', '#fcf6ba'] });
                alert(status === 'attending' ? `See you there, ${name}!` : `Thank you for your prayers, ${name}.`);
                setView('invite');
            };

            useEffect(() => {
                const timer = setInterval(() => {
                    const diff = weddingDate - new Date();
                    if (diff > 0) {
                        setTimeLeft({
                            DAYS: Math.floor(diff / (1000 * 60 * 60 * 24)),
                            HRS: Math.floor((diff / (1000 * 60 * 60)) % 24),
                            MINS: Math.floor((diff / (1000 * 60)) % 60),
                            SECS: Math.floor((diff / 1000) % 60)
                        });
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="w-full flex justify-center items-center py-10 px-4 relative">
                    <div className="page-background"></div>
                    {[...Array(8)].map((_, i) => (
                        <div key={i} className="petal" style={{ width: '12px', height: '12px', left: Math.random() * 100 + '%', animationDelay: Math.random() * 10 + 's' }} />
                    ))}
                    
                    <div className="card-float text-center text-white">
                        <div className="flex justify-center mb-8 gap-8">
                            <button onClick={() => setView('invite')} className={`text-[9px] uppercase tracking-[0.3em] pb-1 ${view === 'invite' ? 'text-white border-b border-amber-400 font-bold' : 'text-gray-400'}`}>The Invite</button>
                            <button onClick={() => setView('rsvp')} className={`text-[9px] uppercase tracking-[0.3em] pb-1 ${view === 'rsvp' ? 'text-white border-b border-amber-400 font-bold' : 'text-gray-400'}`}>RSVP</button>
                        </div>

                        {view === 'invite' ? (
                            <div className="space-y-6 animate-in fade-in duration-1000">
                                <div className="font-arabic text-3xl gold-text leading-loose">
                                    بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ
                                </div>
                                <div className="space-y-1">
                                    <p className="text-[10px] tracking-[0.4em] uppercase text-gray-300 font-light">Beginning a</p>
                                    <p className="font-cursive text-3xl gold-text">Journey of Romantic Love</p>
                                </div>
                                
                                <h1 className="font-serif-elegant text-4xl tracking-widest text-white uppercase pt-4 leading-tight">Afeef & Nada</h1>
                                <p className="text-[10px] tracking-[0.2em] uppercase text-amber-500/80 font-bold">Reception Ceremony</p>
                                
                                <div className="grid grid-cols-4 gap-2 py-6 border-y border-white/10">
                                    {Object.entries(timeLeft).map(([label, val]) => (
                                        <div key={label}>
                                            <div className="text-xl font-semibold text-white">{val}</div>
                                            <div className="text-[7px] uppercase tracking-widest text-gray-400">{label}</div>
                                        </div>
                                    ))}
                                </div>

                                <div className="text-sm tracking-[0.1em] text-gray-200">
                                    <p className="font-bold text-white text-lg mb-1">JUNE 21, 2026</p>
                                    <p>6:00 PM — 9:00 PM</p>
                                    <p className="text-[10px] opacity-60 mt-1 uppercase">J & R Convention Center</p>
                                </div>

                                <div className="flex justify-center gap-4 py-6">
                                    <a href={mapUrl} target="_blank" className="icon-oval">
                                        <span className="text-xl">📍</span>
                                        <span className="text-[7px] uppercase text-gray-300 font-bold mt-1">Location</span>
                                    </a>
                                    <a href={calendarUrl} target="_blank" className="icon-oval">
                                        <span className="text-xl">📅</span>
                                        <span className="text-[7px] uppercase text-gray-300 font-bold mt-1">Save Date</span>
                                    </a>
                                    <a href={whatsappUrl} target="_blank" className="icon-oval">
                                        <span className="text-xl">💬</span>
                                        <span className="text-[7px] uppercase text-gray-300 font-bold mt-1">Contact</span>
                                    </a>
                                </div>

                                <button onClick={() => setView('rsvp')} className="w-full py-5 gold-btn rounded-2xl uppercase text-[11px] tracking-[0.2em] shadow-lg">Confirm Attendance</button>
                            </div>
                        ) : (
                            <form onSubmit={handleRSVPSubmit} className="animate-in slide-in-from-bottom duration-500 text-left space-y-6">
                                <h2 className="font-serif-elegant text-3xl gold-text text-center uppercase tracking-widest mb-4">RSVP</h2>
                                <input required type="text" value={name} onChange={e => setName(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white outline-none focus:border-amber-500" placeholder="Full Name" />

                                <div className="flex gap-4">
                                    <button type="button" onClick={() => setStatus('attending')} className={`flex-1 py-4 text-[11px] uppercase tracking-widest font-bold border rounded-2xl transition ${status === 'attending' ? 'bg-white/20 text-white border-amber-400' : 'border-white/10 text-gray-500'}`}>Attending</button>
                                    <button type="button" onClick={() => setStatus('not_attending')} className={`flex-1 py-4 text-[11px] uppercase tracking-widest font-bold border rounded-2xl transition ${status === 'not_attending' ? 'bg-white/5 text-gray-300 border-white/20' : 'border-white/10 text-gray-500'}`}>Unable</button>
                                </div>

                                {status === 'attending' ? (
                                    <div className="bg-white/5 p-6 rounded-3xl text-center border border-white/10">
                                        <p className="text-[9px] uppercase tracking-widest text-amber-500 mb-4 font-bold">Number of Attendees</p>
                                        <div className="flex justify-center items-center gap-10">
                                            <button type="button" onClick={() => setGuestCount(Math.max(1, guestCount-1))} className="text-3xl text-amber-500">-</button>
                                            <span className="text-3xl font-semibold">{guestCount}</span>
                                            <button type="button" onClick={() => setGuestCount(guestCount+1)} className="text-3xl text-amber-500">+</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="p-8 text-center bg-black/10 rounded-3xl border border-white/5">
                                        <p className="italic text-gray-400 text-sm font-light">"Wishing you a lifetime of love and happiness. We'll be there with you in spirit and prayers." 🤲</p>
                                    </div>
                                )}
                                <button type="submit" className="w-full py-5 gold-btn rounded-2xl uppercase text-[11px] tracking-[0.2em]">Submit Response</button>
                            </form>
                        )}
                        <p className="mt-10 text-[8px] text-gray-600 font-bold tracking-[0.4em] uppercase pt-4 border-t border-white/5">With Love, Family & Friends</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WeddingApp />);
    </script>
</body>
</html>
