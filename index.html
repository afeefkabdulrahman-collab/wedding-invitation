<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <title>Afeef & Nada Wedding</title>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useState, useMemo } = React;

        function WeddingInvitation() {
            const weddingDate = new Date("2026-06-21T00:00:00");
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });

            useEffect(() => {
                const calculateTime = () => {
                    const now = new Date();
                    const diff = weddingDate - now;
                    if (diff <= 0) return;
                    setTimeLeft({
                        days: Math.floor(diff / (1000 * 60 * 60 * 24)),
                        hours: Math.floor((diff / (1000 * 60 * 60)) % 24),
                        minutes: Math.floor((diff / (1000 * 60)) % 60),
                        seconds: Math.floor((diff / 1000) % 60),
                    });
                };
                calculateTime();
                const interval = setInterval(calculateTime, 1000);
                return () => clearInterval(interval);
            }, []);

            const calendarUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent("Wedding Ceremony - Afeef & Nada")}&dates=20260621T180000Z/20260621T230000Z&location=${encodeURIComponent("J & R Convention Center")}`;

            return (
                <div className="relative min-h-screen flex items-center justify-center p-4 overflow-hidden font-sans">
                    <div className="absolute inset-0 bg-gradient-to-br from-green-50 via-emerald-50 to-teal-100" />
                    <style>{`
                        .particle { position: absolute; width: 6px; height: 6px; background: rgba(255,255,255,0.8); border-radius: 50%; animation: float 10s linear infinite; }
                        @keyframes float { 0% { transform: translateY(100vh); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }
                    `}</style>
                    {[...Array(20)].map((_, i) => (
                        <div key={i} className="particle" style={{ left: `${Math.random() * 100}%`, animationDelay: `${Math.random() * 8}s` }} />
                    ))}
                    <div className="relative z-10 w-full max-w-xl bg-white/70 backdrop-blur-xl border border-green-100 rounded-3xl shadow-xl p-6 text-center">
                        <div className="text-xs tracking-[0.3em] text-green-600 mb-4">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْم</div>
                        <h1 className="text-3xl font-light text-green-800">Wedding Invitation</h1>
                        <p className="mt-2 text-sm text-green-600 italic">A romantic journey of two hearts becoming one</p>
                        <h2 className="mt-8 text-xl font-medium text-green-900">Afeef K Abdul Rahman</h2>
                        <div className="text-green-400 my-1">&</div>
                        <h2 className="text-xl font-medium text-green-900">Nada Nesrin</h2>
                        <div className="mt-8 grid grid-cols-4 gap-2 text-center">
                            {["Days", "Hours", "Minutes", "Seconds"].map((label, i) => (
                                <div key={label} className="bg-green-50 rounded-xl py-3 border border-green-100">
                                    <p className="text-lg font-light text-green-900">{Object.values(timeLeft)[i]}</p>
                                    <p className="text-[10px] text-green-600">{label}</p>
                                </div>
                            ))}
                        </div>
                        <div className="mt-8 text-sm text-green-700 space-y-1">
                            <p>📍 J & R Convention Center</p>
                            <p>📅 June 21, 2026</p>
                        </div>
                        <div className="mt-6 flex flex-col sm:flex-row gap-3 justify-center">
                            <a href="https://maps.app.goo.gl/nPXcPhx9wm168xNPA" className="px-5 py-2 rounded-full border border-green-200 text-green-700">📍 Location</a>
                            <a href={calendarUrl} target="_blank" className="px-5 py-2 rounded-full bg-green-600 text-white">📅 Calendar</a>
                            <a href="https://wa.me/971565567150" target="_blank" className="px-5 py-2 rounded-full bg-emerald-500 text-white">💬 WhatsApp</a>
                        </div>
                        <p className="mt-8 text-xs text-green-600">With love, Family & Friends 💚</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WeddingInvitation />);
    </script>
</body>
</html>
