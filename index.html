<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>Afeef & Nada Wedding</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Inter:wght@300;400;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #061a14; overflow-x: hidden; }
        .font-serif-elegant { font-family: 'Cinzel', serif; }
        .font-cursive { font-family: 'Great Vibes', cursive; }

        .bg-pattern {
            background-color: #061a14;
            background-image: url("https://www.transparenttextures.com/patterns/dark-matter.png");
        }

        .gold-gradient-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gold-border {
            border: 2px solid transparent;
            border-image: linear-gradient(to bottom right, #bf953f, #fcf6ba, #aa771c) 1;
        }

        .flower {
            position: absolute; opacity: 0.2; pointer-events: none;
            filter: sepia(1) saturate(2) hue-rotate(10deg);
            animation: float 25s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-1200px) rotate(360deg); }
        }
    </style>
</head>
<body class="bg-pattern text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useState } = React;

        function WeddingApp() {
            const [view, setView] = useState('invite');
            const [status, setStatus] = useState('attending');
            const [guestCount, setGuestCount] = useState(1);
            const [name, setName] = useState('');
            const weddingDate = new Date("2026-06-21T00:00:00");
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, mins: 0, secs: 0 });

            // Links - UPDATE THESE
            const mapUrl = "https://maps.google.com/?q=J+%26+R+Convention+Center"; 
            const whatsappUrl = "https://wa.me/971565567150?text=Salam!%20Regarding%20the%20wedding%20of%20Afeef%20%26%20Nada...";

            const handleRSVPSubmit = (e) => {
                e.preventDefault();
                if (status === 'attending') {
                    confetti({
                        particleCount: 150,
                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#bf953f', '#fcf6ba', '#aa771c']
                    });
                    alert(`Congratulations ${name}! We look forward to seeing you! 🥂`);
                } else {
                    alert(`Thank you for letting us know, ${name}. Please include us in your prayers! 🤲`);
                }
                setView('invite');
            };

            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date();
                    const diff = weddingDate - now;
                    if (diff > 0) {
                        setTimeLeft({
                            days: Math.floor(diff / (1000 * 60 * 60 * 24)),
                            hours: Math.floor((diff / (1000 * 60 * 60)) % 24),
                            mins: Math.floor((diff / (1000 * 60)) % 60),
                            secs: Math.floor((diff / 1000) % 60)
                        });
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
                    
                    {/* Floating Floral Elements */}
                    <img src="https://cdn-icons-png.flaticon.com/512/2926/2926331.png" className="flower w-24" style={{left: '5%', bottom: '-150px'}} />
                    <img src="https://cdn-icons-png.flaticon.com/512/2926/2926331.png" className="flower w-32" style={{right: '8%', bottom: '-250px', animationDelay: '7s'}} />

                    <div className="relative z-10 w-full max-w-lg bg-black/60 backdrop-blur-2xl gold-border rounded-sm shadow-2xl p-8 text-center">
                        
                        {/* Tab Navigation */}
                        <div className="inline-flex border border-gold-700/30 p-1 mb-10">
                            <button onClick={() => setView('invite')} className={`px-8 py-2 text-[10px] font-bold tracking-widest uppercase transition-all ${view === 'invite' ? 'bg-[#aa771c] text-black' : 'text-amber-200/60'}`}>Invitation</button>
                            <button onClick={() => setView('rsvp')} className={`px-8 py-2 text-[10px] font-bold tracking-widest uppercase transition-all ${view === 'rsvp' ? 'bg-[#aa771c] text-black' : 'text-amber-200/60'}`}>RSVP</button>
                        </div>

                        {view === 'invite' ? (
                            <div className="space-y-8 animate-in fade-in zoom-in duration-1000">
                                <div className="text-amber-200/70 tracking-[0.6em] text-[10px] font-bold uppercase mb-4">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْم</div>
                                
                                <h1 className="font-serif-elegant text-5xl gold-gradient-text leading-tight">Afeef & Nada</h1>
                                <p className="font-cursive text-3xl text-amber-100/60">The Wedding Celebration</p>
                                
                                <div className="grid grid-cols-4 gap-3">
                                    {Object.entries(timeLeft).map(([label, val]) => (
                                        <div key={label} className="border border-amber-900/40 bg-white/5 py-4">
                                            <div className="text-2xl font-bold text-amber-200">{val}</div>
                                            <div className="text-[8px] uppercase text-amber-500/80 font-bold tracking-widest">{label}</div>
                                        </div>
                                    ))}
                                </div>

                                <div className="py-6 border-y border-amber-900/30 space-y-4">
                                    <div className="text-amber-100 text-sm tracking-widest font-light">
                                        <span className="block text-[9px] uppercase text-amber-600 font-bold mb-1">When</span>
                                        JUNE 21, 2026
                                    </div>
                                    <div className="text-amber-100 text-sm tracking-widest font-light">
                                        <span className="block text-[9px] uppercase text-amber-600 font-bold mb-1">Where</span>
                                        J & R CONVENTION CENTER
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <button onClick={() => setView('rsvp')} className="w-full py-4 bg-gradient-to-r from-[#bf953f] via-[#fcf6ba] to-[#aa771c] text-black font-black uppercase tracking-[0.2em] text-[10px] shadow-lg hover:brightness-110 transition">
                                        RSVP Now
                                    </button>
                                    <div className="flex gap-3">
                                        <a href={mapUrl} target="_blank" className="flex-1 py-3 border border-amber-700/50 text-amber-200 text-[9px] font-bold uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-amber-900/20">
                                            📍 Location
                                        </a>
                                        <a href={whatsappUrl} target="_blank" className="flex-1 py-3 border border-amber-700/50 text-amber-200 text-[9px] font-bold uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-amber-900/20">
                                            💬 WhatsApp
                                        </a>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <form onSubmit={handleRSVPSubmit} className="space-y-6 text-left animate-in slide-in-from-bottom duration-500">
                                <h2 className="font-serif-elegant text-3xl gold-gradient-text text-center">RSVP</h2>
                                
                                <div className="space-y-5">
                                    <div>
                                        <label className="block text-[9px] uppercase text-amber-600 font-bold mb-2 tracking-widest">Full Name</label>
                                        <input required type="text" value={name} onChange={e => setName(e.target.value)} className="w-full bg-white/5 border border-amber-900/50 p-3 text-amber-100 outline-none focus:border-amber-400" />
                                    </div>

                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => setStatus('attending')} className={`flex-1 py-3 text-[9px] font-bold uppercase border tracking-widest transition ${status === 'attending' ? 'bg-amber-600 text-black border-amber-600' : 'border-amber-900 text-amber-600'}`}>Attending</button>
                                        <button type="button" onClick={() => setStatus('not_attending')} className={`flex-1 py-3 text-[9px] font-bold uppercase border tracking-widest transition ${status === 'not_attending' ? 'bg-red-900/50 text-white border-red-900' : 'border-amber-900 text-amber-600'}`}>Not Attending</button>
                                    </div>

                                    {status === 'attending' ? (
                                        <div className="bg-white/5 p-5 border border-amber-900/40 text-center animate-in fade-in duration-300">
                                            <label className="block text-[9px] uppercase text-amber-600 font-bold mb-3 tracking-widest">Number of Guests</label>
                                            <div className="flex items-center justify-center gap-8">
                                                <button type="button" onClick={() => setGuestCount(Math.max(1, guestCount-1))} className="text-amber-200 text-3xl">-</button>
                                                <span className="text-3xl font-serif text-amber-100">{guestCount}</span>
                                                <button type="button" onClick={() => setGuestCount(guestCount+1)} className="text-amber-200 text-3xl">+</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="p-6 border-2 border-dotted border-amber-900/50 text-center animate-in zoom-in duration-300">
                                            <p className="text-amber-200/80 italic font-serif text-sm">"Include us in your prayers 🤲"</p>
                                        </div>
                                    )}

                                    <button type="submit" className="w-full py-4 bg-gradient-to-r from-[#bf953f] via-[#fcf6ba] to-[#aa771c] text-black font-black uppercase tracking-[0.2em] text-[10px]">
                                        Submit Response
                                    </button>
                                    
                                    <button type="button" onClick={() => setView('invite')} className="w-full text-center text-[9px] text-amber-600 uppercase tracking-widest underline decoration-amber-900 underline-offset-4">Back to Invitation</button>
                                </div>
                            </form>
                        )}
                        
                        <p className="mt-10 text-[8px] text-amber-800 font-bold tracking-[0.5em] uppercase border-t border-amber-900/20 pt-4">With Love, Family & Friends</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WeddingApp />);
    </script>
</body>
</html>
