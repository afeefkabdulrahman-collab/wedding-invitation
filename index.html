<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>Afeef & Nada Reception</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Amiri:wght@400;700&family=Montserrat:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #0a0a0a; 
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }

        .font-serif-elegant { font-family: 'Cinzel', serif; }
        .font-cursive { font-family: 'Great Vibes', cursive; }
        .font-arabic { font-family: 'Amiri', serif; }

        /* The Main Background */
        .page-background {
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)), 
                              url('https://raw.githubusercontent.com/Afeefk/Afeef_nada.wed/main/IMG_7009.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Golden Gradient Text & Borders */
        .gold-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gold-border {
            border: 1px solid transparent;
            border-image: linear-gradient(to right, #bf953f, #aa771c) 1;
        }

        .gold-button {
            background: linear-gradient(135deg, #bf953f 0%, #aa771c 100%);
            color: #000;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(191, 149, 63, 0.3);
        }

        /* Modern Icon Circle */
        .icon-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(191, 149, 63, 0.3);
            transition: all 0.3s ease;
        }
        .icon-box:hover {
            background: rgba(191, 149, 63, 0.1);
            border-color: #fcf6ba;
            transform: translateY(-3px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.8s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useState } = React;

        function WeddingApp() {
            const [view, setView] = useState('invite');
            const [status, setStatus] = useState('attending');
            const [guestCount, setGuestCount] = useState(1);
            const [name, setName] = useState('');
            
            const weddingDate = new Date("2026-06-21T18:00:00");
            const [timeLeft, setTimeLeft] = useState({ DAYS: 0, HRS: 0, MINS: 0, SECS: 0 });

            // Links
            const mapUrl = "https://maps.google.com/?q=J+%26+R+Convention+Center"; 
            const whatsappUrl = "https://wa.me/971565567150";
            const calendarUrl = "https://www.google.com/calendar/render?action=TEMPLATE&text=Reception:+Afeef+%26+Nada&dates=20260621T180000/20260621T210000&location=J+%26+R+Convention+Center";

            const handleRSVPSubmit = (e) => {
                e.preventDefault();
                if (status === 'attending') {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#bf953f', '#fcf6ba'] });
                    alert(`Honored to have you, ${name}!`);
                } else {
                    alert(`Thank you for your prayers, ${name}.`);
                }
                setView('invite');
            };

            useEffect(() => {
                const timer = setInterval(() => {
                    const diff = weddingDate - new Date();
                    if (diff > 0) {
                        setTimeLeft({
                            DAYS: Math.floor(diff / (1000 * 60 * 60 * 24)),
                            HRS: Math.floor((diff / (1000 * 60 * 60)) % 24),
                            MINS: Math.floor((diff / (1000 * 60)) % 60),
                            SECS: Math.floor((diff / 1000) % 60)
                        });
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="relative min-h-screen flex items-center justify-center p-4">
                    <div className="page-background"></div>
                    
                    <div className="w-full max-w-lg bg-black/80 backdrop-blur-md border border-white/10 rounded-2xl p-8 text-center shadow-2xl relative">
                        
                        {/* Tab Toggle */}
                        <div className="flex justify-center mb-8 gap-4">
                            <button onClick={() => setView('invite')} className={`text-[10px] uppercase tracking-[0.2em] transition ${view === 'invite' ? 'gold-text border-b border-amber-400 font-bold' : 'text-gray-500'}`}>Invitation</button>
                            <button onClick={() => setView('rsvp')} className={`text-[10px] uppercase tracking-[0.2em] transition ${view === 'rsvp' ? 'gold-text border-b border-amber-400 font-bold' : 'text-gray-500'}`}>RSVP</button>
                        </div>

                        {view === 'invite' ? (
                            <div className="animate-fade space-y-6">
                                <div className="font-arabic text-5xl gold-text py-4">
                                    بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْم
                                </div>
                                
                                <h1 className="font-serif-elegant text-4xl tracking-widest text-white uppercase">Afeef & Nada</h1>
                                <p className="font-cursive text-3xl gold-text">Reception Ceremony</p>
                                
                                {/* Countdown Section */}
                                <div className="grid grid-cols-4 gap-2 py-4 border-y border-white/5">
                                    {Object.entries(timeLeft).map(([label, val]) => (
                                        <div key={label}>
                                            <div className="text-xl font-bold text-white">{val}</div>
                                            <div className="text-[7px] uppercase tracking-widest text-amber-500/80">{label}</div>
