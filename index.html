<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>Afeef & Nada Reception</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Amiri:wght@400;700&family=Montserrat:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow-x: hidden;
        }

        .font-serif-elegant { font-family: 'Cinzel', serif; }
        .font-cursive { font-family: 'Great Vibes', cursive; }
        .font-arabic { font-family: 'Amiri', serif; }

        /* Background: Removed Image, Added Warm Gradient */
        .page-background {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #103a2e 0%, #1a715b 50%, #e0f2fe 100%);
            z-index: -2;
        }

        /* Gold Leaf Pattern Overlay */
        .pattern-overlay {
            position: fixed; inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            opacity: 0.1;
            z-index: -1;
        }

        /* Glassmorphism Floating Card */
        .card-float {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
            width: 100%;
            max-width: 480px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s;
        }
        .card-float:hover { transform: translateY(-5px); }

        /* Floating Flower Petals (Romantic effect) */
        .petal {
            position: absolute; pointer-events: none;
            background: #fff; border-radius: 0 50% 0 50%;
            opacity: 0.3; animation: fall 15s infinite linear;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Gold Gradient Text */
        .gold-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Perfectly Rounded Modern Icons */
        .icon-circle {
            width: 65px; height: 65px; border-radius: 999px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .icon-circle:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #fcf6ba;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        /* Submit RSVP: Modern Solid Gold Button */
        .gold-btn {
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 50%, #aa771c 100%);
            color: #1a1a1a;
            font-weight: 700;
            letter-spacing: 0.1em;
            transition: transform 0.2s, brightness 0.2s;
        }
        .gold-btn:active { transform: scale(0.98); }
        .gold-btn:hover { brightness: 110%; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useState } = React;

        function WeddingApp() {
            const [view, setView] = useState('invite');
            const [status, setStatus] = useState('attending');
            const [guestCount, setGuestCount] = useState(1);
            const [name, setName] = useState('');
            
            // June 21, 2026 @ 6:00 PM
            const weddingDate = new Date("2026-06-21T18:00:00");
            const [timeLeft, setTimeLeft] = useState({ DAYS: 0, HRS: 0, MINS: 0, SECS: 0 });

            // UPDATE LINKS HERE
            const mapUrl = "https://maps.google.com/?q=J+%26+R+Convention+Center"; 
            const whatsappUrl = "https://wa.me/971565567150?text=Salam!%20 regarding%20the%20reception%20of%20Afeef%20%26%20Nada";
            const calendarUrl = "https://www.google.com/calendar/render?action=TEMPLATE&text=Reception+Ceremony:+Afeef+%26+Nada&dates=20260621T180000/20260621T210000&location=J+%26+R+Convention+Center";

            const handleRSVPSubmit = (e) => {
                e.preventDefault();
                if (status === 'attending') {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#bf953f', '#e8d2a6'] });
                    alert(`We look forward to seeing you, ${name}!`);
                } else {
                    alert(`Thank you for letting us know, ${name}. Your prayers are greatly appreciated! 🤲`);
                }
                setView('invite');
            };

            useEffect(() => {
                const timer = setInterval(() => {
                    const diff = weddingDate - new Date();
                    if (diff > 0) {
                        setTimeLeft({
                            DAYS: Math.floor(diff / (1000 * 60 * 60 * 24)),
                            HRS: Math.floor((diff / (1000 * 60 * 60)) % 24),
                            MINS: Math.floor((diff / (1000 * 60)) % 60),
                            SECS: Math.floor((diff / 1000) % 60)
                        });
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="w-full flex justify-center items-center py-12 px-4 relative">
                    <div className="page-background"></div>
                    <div className="pattern-overlay"></div>
                    
                    {/* Floating Romantic Petals */}
                    {[...Array(10)].map((_, i) => (
                        <div key={i} className="petal" style={{
                            width: Math.random() * 15 + 10 + 'px',
                            height: Math.random() * 15 + 10 + 'px',
                            left: Math.random() * 100 + '%',
                            animationDelay: Math.random() * 15 + 's',
                            background: i % 2 === 0 ? '#ffdadf' : '#fff' // Some pink, some white
                        }} />
                    ))}
                    
                    <div className="card-float text-center text-white">
                        
                        {/* Tab Toggle */}
                        <div className="flex justify-center mb-10 gap-8">
                            <button onClick={() => setView('invite')} className={`text-[10px] uppercase tracking-[0.3em] transition pb-1 ${view === 'invite' ? 'text-white border-b border-amber-400 font-bold' : 'text-gray-400'}`}>The Invite</button>
                            <button onClick={() => setView('rsvp')} className={`text-[10px] uppercase tracking-[0.3em] transition pb-1 ${view === 'rsvp' ? 'text-white border-b border-amber-400 font-bold' : 'text-gray-400'}`}>RSVP</button>
                        </div>

                        {view === 'invite' ? (
                            <div className="space-y-6 animate-in fade-in duration-1000">
                                <div className="font-arabic text-6xl gold-text py-4 tracking-wider leading-relaxed">
                                    بِسْمِ اللهِ
                                </div>
                                
                                <h1 className="font-serif-elegant text-4xl tracking-widest text-white uppercase leading-tight">Afeef & Nada</h1>
                                <p className="font-cursive text-3xl gold-text">Reception Ceremony</p>
                                
                                {/* Countdown Boxes */}
                                <div className="grid grid-cols-4 gap-2 py-6 border-y border-white/10">
                                    {Object.entries(timeLeft).map(([label, val]) => (
                                        <div key={label}>
                                            <div className="text-2xl font-semibold text-white">{val}</div>
                                            <div className="text-[8px] uppercase tracking-widest text-amber-500/80 font-bold">{label}</div>
                                        </div>
                                    ))}
                                </div>

                                <div className="text-sm tracking-[0.1em] text-gray-100/90 font-light">
                                    <p className="font-semibold text-white text-lg mb-1 uppercase">June 21, 2026</p>
                                    <p className="font-medium">6:00 PM — 9:00 PM</p>
                                    <p className="text-[11px] opacity-70 mt-1 uppercase">J & R Convention Center</p>
                                </div>

                                {/* Modern Perfectly Rounded Icons */}
                                <div className="flex justify-center gap-8 py-6">
                                    <a href={mapUrl} target="_blank" className="icon-circle">
                                        <span className="text-2xl">📍</span>
                                        <span className="text-[8px] uppercase text-gray-300 font-bold">Map</span>
                                    </a>
                                    <a href={calendarUrl} target="_blank" className="icon-circle">
                                        <span className="text-2xl">📅</span>
                                        <span className="text-[8px] uppercase text-gray-300 font-bold">Save</span>
                                    </a>
                                    <a href={whatsappUrl} target="_blank" className="icon-circle">
                                        <span className="text-2xl">💬</span>
                                        <span className="text-[8px] uppercase text-gray-300 font-bold">Chat</span>
                                    </a>
                                </div>

                                <button onClick={() => setView('rsvp')} className="w-full py-5 gold-btn rounded-xl uppercase text-[11px] tracking-[0.2em] shadow-lg">
                                    RSVP to Attend
                                </button>
                            </div>
                        ) : (
                            <form onSubmit={handleRSVPSubmit} className="animate-in slide-in-from-bottom duration-500 text-left space-y-6">
                                <h2 className="font-serif-elegant text-3xl gold-text text-center uppercase tracking-widest mb-4">RSVP</h2>
                                
                                <div>
                                    <label className="text-[9px] uppercase tracking-widest text-amber-500 font-bold mb-2 block">Your Name</label>
                                    <input required type="text" value={name} onChange={e => setName(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none focus:border-amber-500" placeholder="Ex: Mr. Abdul Rahman" />
                                </div>

                                <div className="flex gap-4">
                                    <button type="button" onClick={() => setStatus('attending')} className={`flex-1 py-3 text-[11px] uppercase tracking-widest font-bold border rounded-xl transition ${status === 'attending' ? 'bg-gradient-to-r from-[#fcf6ba] to-[#aa771c] text-black border-amber-500' : 'border-white/10 text-gray-500'}`}>Attending</button>
                                    <button type="button" onClick={() => setStatus('not_attending')} className={`flex-1 py-3 text-[11px] uppercase tracking-widest font-bold border rounded-xl transition ${status === 'not_attending' ? 'bg-red-950/40 text-white border-red-900' : 'border-white/10 text-gray-500'}`}>Unable</button>
                                </div>

                                {status === 'attending' ? (
                                    <div className="bg-white/5 p-6 rounded-2xl text-center border border-white/5 animate-in fade-in duration-300">
                                        <p className="text-[9px] uppercase tracking-widest text-amber-500 mb-4 font-bold">How many guests (including you)?</p>
                                        <div className="flex justify-center items-center gap-10 text-white">
                                            <button type="button" onClick={() => setGuestCount(Math.max(1, guestCount-1))} className="text-3xl text-amber-500 hover:text-white transition">-</button>
                                            <span className="text-3xl font-serif font-semibold">{guestCount}</span>
                                            <button type="button" onClick={() => setGuestCount(guestCount+1)} className="text-3xl text-amber-500 hover:text-white transition">+</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="p-6 text-center border border-dashed border-white/10 rounded-2xl animate-in fade-in duration-300">
                                        <p className="italic text-gray-300">"We appreciate your prayers for our journey ahead." 🤲</p>
                                    </div>
                                )}

                                <button type="submit" className="w-full py-5 gold-btn rounded-xl uppercase text-[11px] tracking-[0.2em] shadow-lg">Submit RSVP</button>
                            </form>
                        )}
                        
                        <p className="mt-10 text-[8px] text-gray-600 font-bold tracking-[0.4em] uppercase border-t border-white/5 pt-4">With Love, Family & Friends</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WeddingApp />);
    </script>
</body>
</html>
