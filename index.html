<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>Afeef & Nada Reception</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Amiri&family=Inter:wght@300;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; color: #111; }
        .font-serif-elegant { font-family: 'Cinzel', serif; }
        .font-cursive { font-family: 'Great Vibes', cursive; }
        .font-arabic { font-family: 'Amiri', serif; }

        .page-background {
            position: fixed; inset: 0;
            background-repeat: no-repeat; background-size: cover; background-position: center;
            /* 👇 PASTE YOUR RAW GITHUB IMAGE URL BELOW 👇 */
            background-image: url('https://github.com/afeefkabdulrahman-collab/wedding-invitation/blob/main/a251ce31-55f1-4fad-9203-384b56a5694f.png');
            filter: saturate(1.1);
            z-index: -1;
        }

        .gold-gradient-text {
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #aa771c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .modern-glass-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }
        .modern-glass-btn:hover { background: rgba(255, 255, 255, 0.3); border: 1px solid rgba(255, 255, 255, 0.6); transform: translateY(-2px); }

        .form-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(135, 137, 137, 0.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useState } = React;

        function WeddingApp() {
            const [view, setView] = useState('invite');
            const [status, setStatus] = useState('attending');
            const [guestCount, setGuestCount] = useState(1);
            const [name, setName] = useState('');
            const weddingDate = new Date("2026-06-21T18:00:00");
            const [timeLeft, setTimeLeft] = useState({ days: 0, hrs: 0, mins: 0, secs: 0 });

            // Links - Update with your actual details
            const mapUrl = "https://maps.google.com/?q=J+%26+R+Convention+Center"; 
            const whatsappUrl = "https://wa.me/971565567150";
            const calendarUrl = "https://www.google.com/calendar/render?action=TEMPLATE&text=Reception+Ceremony:+Afeef+%26+Nada&dates=20260621T180000/20260621T210000&details=Invitation+to+the+wedding+reception+of+Afeef+and+Nada.&location=J+%26+R+Convention+Center";

            const handleRSVPSubmit = (e) => {
                e.preventDefault();
                if (status === 'attending') {
                    confetti({ particleCount: 120, spread: 70, origin: { y: 0.6 }, colors: ['#bf953f', '#e8d2a6', '#aa771c'] });
                    alert(`Thank you, ${name}! We are excited to see you!`);
                } else {
                    alert(`Thank you, ${name}. Your prayers are greatly appreciated! 🤲`);
                }
                setView('invite');
            };

            useEffect(() => {
                const timer = setInterval(() => {
                    const diff = weddingDate - new Date();
                    if (diff > 0) {
                        setTimeLeft({
                            days: Math.floor(diff / (1000 * 60 * 60 * 24)),
                            hrs: Math.floor((diff / (1000 * 60 * 60)) % 24),
                            mins: Math.floor((diff / (1000 * 60)) % 60),
                            secs: Math.floor((diff / 1000) % 60)
                        });
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="relative min-h-screen">
                    {/* Fixed Background Element */}
                    <div className="page-background"></div>
                    
                    {/* Main Content Area */}
                    <div className="flex items-center justify-center p-6 min-h-screen pb-28">
                        
                        <div className="w-full max-w-lg rounded-[2rem] p-8 text-center relative z-10 border border-white/20 bg-white/10 backdrop-blur-sm">
                            
                            {/* Modern Tab Switcher */}
                            <div className="flex justify-center gap-1 mb-8 border border-gray-200 rounded-full p-1 bg-white/20">
                                <button onClick={() => setView('invite')} className={`flex-1 px-6 py-2 rounded-full text-[9px] font-bold uppercase tracking-widest ${view === 'invite' ? 'bg-white/40 text-gray-900' : 'text-gray-600'}`}>Invitation</button>
                                <button onClick={() => setView('rsvp')} className={`flex-1 px-6 py-2 rounded-full text-[9px] font-bold uppercase tracking-widest ${view === 'rsvp' ? 'bg-white/40 text-gray-900' : 'text-gray-600'}`}>RSVP</button>
                            </div>

                            {view === 'invite' ? (
                                <div className="space-y-6 animate-in fade-in duration-1000">
                                    <div className="font-arabic text-5xl gold-gradient-text mb-6">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْم</div>
                                    
                                    <h1 className="font-serif-elegant text-4xl gold-gradient-text leading-tight">Afeef & Nada</h1>
                                    <p className="font-cursive text-3xl text-gray-700">The Reception Celebration</p>
                                    
                                    {/* Modern Countdown Boxes */}
                                    <div className="flex justify-center gap-2 mb-8 text-gray-800">
                                        {Object.entries(timeLeft).map(([label, val]) => (
                                            <div key={label} className="modern-glass-btn flex-1 py-3 rounded-xl border-gray-100/50">
                                                <div className="text-2xl font-semibold">{val}</div>
                                                <div className="text-[7px] uppercase tracking-widest opacity-70 font-bold">{label}</div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="space-y-1 mb-8 text-gray-700/90 text-sm tracking-wide font-light border-y border-white/20 py-5">
                                        <p className="font-semibold text-gray-900 uppercase text-lg mb-1">June 21, 2026</p>
                                        <p className="font-medium">6:00 PM — 9:00 PM</p>
                                        <p className="opacity-80">J & R Convention Center</p>
                                    </div>

                                    {/* Modern Glass Icon Buttons */}
                                    <div className="flex justify-center gap-6 mb-8">
                                        <a href={mapUrl} target="_blank" className="group modern-glass-btn w-16 h-16 flex flex-col items-center justify-center rounded-2xl gap-1 border-gray-100/50">
                                            <span className="text-xl">📍</span>
                                            <span className="text-[8px] uppercase tracking-tighter text-gray-700/70">Location</span>
                                        </a>
                                        <a href={calendarUrl} target="_blank" className="group modern-glass-btn w-16 h-16 flex flex-col items-center justify-center rounded-2xl gap-1 border-gray-100/50">
                                            <span className="text-xl">📅</span>
                                            <span className="text-[8px] uppercase tracking-tighter text-gray-700/70">Save</span>
                                        </a>
                                        <a href={whatsappUrl} target="_blank" className="group modern-glass-btn w-16 h-16 flex flex-col items-center justify-center rounded-2xl gap-1 border-gray-100/50">
                                            <span className="text-xl">💬</span>
                                            <span className="text-[8px] uppercase tracking-tighter text-gray-700/70">Chat</span>
                                        </a>
                                    </div>
                                    
                                    <p className="text-[9px] text-gray-500 uppercase tracking-[0.4em] pt-4">With Love, Family & Friends</p>
                                </div>
                            ) : (
                                <form onSubmit={handleRSVPSubmit} className="animate-in slide-in-from-bottom duration-500 space-y-8">
                                    <h2 className="font-serif-elegant text-2xl gold-gradient-text text-center">Are you joining us?</h2>
                                    
                                    <input required type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Enter Your Name" className="w-full form-input rounded-full px-6 py-4 outline-none text-center text-gray-900 text-sm focus:border-amber-400 transition" />

                                    <div className="flex justify-center gap-3">
                                        <button type="button" onClick={() => setStatus('attending')} className={`flex-1 py-3 rounded-full text-[9px] uppercase tracking-widest font-bold border transition ${status === 'attending' ? 'bg-amber-400 text-black border-amber-400' : 'bg-white/30 text-gray-700 border-gray-200'}`}>Attending</button>
                                        <button type="button" onClick={() => setStatus('not_attending')} className={`flex-1 py-3 rounded-full text-[9px] uppercase tracking-widest font-bold border transition ${status === 'not_attending' ? 'bg-red-900/50 text-white border-red-900' : 'bg-white/30 text-gray-700 border-gray-200'}`}>Unable to attend</button>
                                    </div>

                                    {status === 'attending' ? (
                                        <div className="bg-white/20 p-6 rounded-2xl text-center animate-in fade-in duration-300">
                                            <label className="block text-[8px] uppercase text-amber-700 font-bold mb-3 tracking-widest">How many attendees?</label>
                                            <div className="flex items-center justify-center gap-8 text-amber-900">
                                                <button type="button" onClick={() => setGuestCount(Math.max(1, guestCount-1))} className="text-3xl">-</button>
                                                <span className="text-3xl font-semibold text-gray-900">{guestCount}</span>
                                                <button type="button" onClick={() => setGuestCount(guestCount+1)} className="text-3xl">+</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <p className="italic text-gray-600 mb-10 p-5 border border-dashed border-gray-300 rounded-2xl animate-in zoom-in duration-300">"We appreciate your prayers for our journey ahead." 🤲</p>
                                    )}

                                    <button type="submit" className="w-full py-4 modern-glass-btn text-gray-900 border border-gray-200 rounded-full text-xs font-bold uppercase tracking-widest shadow-lg">Submit Response</button>
                                </form>
                            )}
                        </div>
                    </div>

                    {/* ✅ RSVP Now: Bottom Sticky Button */}
                    {view === 'invite' && (
                        <div className="fixed bottom-0 left-0 right-0 p-6 z-20 animate-in slide-in-from-bottom duration-500 delay-500">
                            <button onClick={() => { setView('rsvp'); confetti(); }} className="w-full py-5 max-w-lg mx-auto block bg-gradient-to-r from-[#bf953f] to-[#aa771c] text-white rounded-full text-sm font-bold uppercase tracking-widest shadow-2xl hover:scale-105 transition-transform duration-300">
                                RSVP to Confirm Attendance
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WeddingApp />);
    </script>
</body>
</html>
